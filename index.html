<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#061E15" />
    <title>Marciência</title>
    <link rel="icon" href="assets/favicon-cat.jpg" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Babylonica&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="topbar">
        <div>
          <h1>Marciência</h1>
          <p id="status" class="sr-only" aria-live="polite">Game ready</p>
        </div>
        <div class="stats" aria-label="Game stats">
          <span id="moves">0</span>
          <span id="timer">00:00</span>
        </div>
      </header>

      <section class="controls" aria-label="Game controls">
        <button id="newGame" type="button" aria-label="New game" title="New game">
          <svg class="control-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 12a9 9 0 0 1 15.4-6.36L21 8" />
            <path d="M21 3v5h-5" />
            <path d="M21 12a9 9 0 0 1-15.4 6.36L3 16" />
            <path d="M3 21v-5h5" />
          </svg>
        </button>
        <button id="undo" type="button" aria-label="Undo" title="Undo">
          <svg class="control-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 14 4 9l5-5" />
            <path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11" />
          </svg>
        </button>
        <button id="hint" type="button" aria-label="Hint" title="Hint">
          <svg class="control-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 18h6" />
            <path d="M10 22h4" />
            <path d="M12 2a7 7 0 0 0-4 12.74c.64.45 1 1.18 1 1.96V17h6v-.3c0-.78.36-1.51 1-1.96A7 7 0 0 0 12 2Z" />
          </svg>
        </button>
      </section>

      <section class="board" aria-label="Marciência board">
        <div class="stock-row">
          <div id="foundation-0" class="pile foundation" data-pile="foundation" data-index="0" data-suit="♠" aria-label="Spades foundation"></div>
          <div id="foundation-1" class="pile foundation" data-pile="foundation" data-index="1" data-suit="♥" aria-label="Hearts foundation"></div>
          <div id="foundation-2" class="pile foundation" data-pile="foundation" data-index="2" data-suit="♦" aria-label="Diamonds foundation"></div>
          <div id="foundation-3" class="pile foundation" data-pile="foundation" data-index="3" data-suit="♣" aria-label="Clubs foundation"></div>
          <div class="spacer"></div>
          <div id="waste" class="pile waste" data-pile="waste" aria-label="Waste pile"></div>
          <div id="stock" class="pile stock" data-pile="stock" aria-label="Stock pile"></div>
        </div>

        <div class="tableau-row" aria-label="Tableau">
          <div id="tableau-0" class="pile tableau" data-pile="tableau" data-index="0"></div>
          <div id="tableau-1" class="pile tableau" data-pile="tableau" data-index="1"></div>
          <div id="tableau-2" class="pile tableau" data-pile="tableau" data-index="2"></div>
          <div id="tableau-3" class="pile tableau" data-pile="tableau" data-index="3"></div>
          <div id="tableau-4" class="pile tableau" data-pile="tableau" data-index="4"></div>
          <div id="tableau-5" class="pile tableau" data-pile="tableau" data-index="5"></div>
          <div id="tableau-6" class="pile tableau" data-pile="tableau" data-index="6"></div>
        </div>
      </section>
    </main>

    <div id="dragLayer" class="drag-layer" aria-hidden="true"></div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <section id="winOverlay" class="win-overlay" aria-label="Game won" aria-hidden="true">
      <div class="win-stage">
        <h2 class="win-title">Marciência</h2>
        <div class="win-card" aria-hidden="true">
          <div class="win-card-inner">
            <div class="win-card-face win-card-front">
              <span class="win-rank">A</span>
              <span class="win-suit">♣</span>
            </div>
            <div class="win-card-face win-card-back"></div>
          </div>
        </div>
      </div>
      <button id="winNewGame" type="button" class="win-new-game">New Game</button>
    </section>

    <script src="app.js"></script>
  </body>
</html>
